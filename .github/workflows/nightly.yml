name: Nightly model drift check

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  model-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check pinned model ID
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          test -n "$OPENAI_API_KEY"
          curl --fail --silent --show-error https://api.openai.com/v1/models \
            -H "Authorization: Bearer $OPENAI_API_KEY" > models.json
          if ! jq -e '.data[] | select(.id == "gpt-5-nano-2025-08-07")' models.json >/dev/null; then
            gh issue create --title "model-drift: gpt-5-nano-2025-08-07 unavailable" --body "The weekly verified model-list check did not find the pinned model. Do not change OPENAI_MODEL without review and a merged test update." || true
            exit 1
          fi
